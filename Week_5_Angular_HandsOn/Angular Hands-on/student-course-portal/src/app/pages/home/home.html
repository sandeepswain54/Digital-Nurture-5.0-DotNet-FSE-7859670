<div class="home-container">
  <h1>{{ portalName }}</h1>
  <p>Your one-stop platform to browse courses,
     track enrollment, and manage your academic journey.
  </p>

  <!-- Live stats from NgRx store -->
  <div class="stats-row">
    <div class="stat-card">
      <h3>{{ coursesCount$ | async }}</h3>
      <p>Courses Available</p>
    </div>
    <div class="stat-card">
      <h3>{{ enrolledCount$ | async }}</h3>
      <p>Enrolled</p>
    </div>
    <div class="stat-card">
      <h3>{{ gpa }}</h3>
      <p>GPA</p>
    </div>
  </div>

  <div class="binding-section">
    <button
      [disabled]="!isPortalActive"
      (click)="onEnrollClick()"
      class="enroll-btn">
      Enroll Now
    </button>

    <p *ngIf="message" class="message">
      {{ message }}
    </p>

    <div class="search-box">
      <input
        [(ngModel)]="searchTerm"
        placeholder="Search courses..."
        class="search-input"/>
      <p *ngIf="searchTerm">
        Searching for:
        <strong>{{ searchTerm }}</strong>
      </p>
    </div>
  </div>
</div>
